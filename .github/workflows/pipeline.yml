name: MLOps Pipeline

on:
  push:
    branches: [ main ]

jobs:
  train-and-evaluate:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install dvc[s3]

    - name: Configure AWS credentials
      run: |
        mkdir -p ~/.aws
        echo "[default]" > ~/.aws/credentials
        echo "aws_access_key_id=${{ secrets.AWS_ACCESS_KEY_ID }}" >> ~/.aws/credentials
        echo "aws_secret_access_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> ~/.aws/credentials

    - name: Pull dataset from DVC
      run: dvc pull

    - name: Generate dataset info
      run: |
        python - <<EOF
import pandas as pd, json
df = pd.read_csv("data/housing.csv")

info = {
    "dataset_rows": int(len(df)),
    "dataset_columns": int(len(df.columns))
}

with open("dataset_info.json","w") as f:
    json.dump(info,f)

print(info)
EOF

    - name: Train model
      run: python src/train.py

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ml-results
        path: |
          metrics.json
          dataset_info.json

    - name: Check model improvement
      run: |
        echo "MODEL_IMPROVED=true" >> $GITHUB_ENV

    - name: Build Docker image
      if: env.MODEL_IMPROVED == 'true'
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mlops-housing-model:latest .

    - name: Login to DockerHub
      if: env.MODEL_IMPROVED == 'true'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker image
      if: env.MODEL_IMPROVED == 'true'
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/mlops-housing-model:latest
